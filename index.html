<!DOCTYPE html>
<html>
<head>
  <title>Student Housing</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container py-4">

  <h2>🏠 Listings</h2>
  <div id="listings" class="row"></div>

  <hr>
  <h2>Add Listing</h2>
  <form id="listingForm">
    <input type="text" id="title" placeholder="Title" required class="form-control mb-2">
    <input type="number" id="rent" placeholder="Rent" required class="form-control mb-2">
    <input type="text" id="location" placeholder="Location" required class="form-control mb-2">
    <input type="text" id="contact" placeholder="Contact (LINE/Email)" required class="form-control mb-2">
    <button type="submit" class="btn btn-primary">Submit</button>
  </form>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxmUfilMMXclq9KsdQ62QaTDNEPkt-ao4-df5RDDgYNc7gnGrvvvTL8I32g1hbXi1zu/exec";

    // Load listings
    async function loadListings() {
      const res = await fetch(`${API_URL}?action=getListings`);
      const data = await res.json();
      let html = "";
      data.forEach(item => {
        html += `
          <div class="col-4 card m-2 p-2">
            <h5>${item.Title}</h5>
            <p>Rent: ${item.Rent} NT$</p>
            <p>Location: ${item.Location}</p>
            <p>Contact: ${item.Contact}</p>
            <p>Verified: ${item.Verified}</p>
            <p>Rating: ${item.Rating}</p>
          </div>
        `;
      });
      document.getElementById("listings").innerHTML = html;
    }

    // Add listing
    document.getElementById("listingForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const data = {
        action: "addListing",
        Title: document.getElementById("title").value,
        Rent: document.getElementById("rent").value,
        Location: document.getElementById("location").value,
        Contact: document.getElementById("contact").value
      };
      await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(data)
      });
      alert("Listing added!");
      loadListings();
    });

    loadListings();
  </script>
</body>
</html>
